<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datos Históricos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>
  <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="#">Datos Energías</a>
        <div class="navbar-nav ms-auto flex-row gap-3">
          <a class="nav-link" href="index.html">Inicio</a>
          <a class="nav-link active" href="datos.html">Datos</a>
          <a class="nav-link" href="calculadora.html">Calculadora</a>
          <a class="nav-link" href="dashboard.html">Dashboard</a>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      
      <div class="text-center mb-5">
        <h1 class="display-5">Datos Históricos de Energía Renovable</h1>
        <p class="text-muted">Consulta y filtra registros globales sobre la transición energética</p>
      </div>

      <div class="row g-4">
        
        <div class="col-lg-5 col-xl-4">
          
          <div class="card p-4 mb-4">
            <h5 class="card-title-custom mb-3">Seleccionar Fuente</h5>
            <div class="d-grid gap-2">
              <button class="btn btn-success text-start" onclick="cargarArchivo('data/01 renewable-share-energy.csv')">
                🌱 Energía Renovable %
              </button>
              <button class="btn btn-warning text-start text-dark" onclick="cargarArchivo('data/12 solar-energy-consumption.csv')">
                ☀️ Energía Solar
              </button>
              <button class="btn btn-primary text-start" onclick="cargarArchivo('data/08 wind-generation.csv')">
                💨 Energía Eólica
              </button>
              <button class="btn btn-info text-start text-white" onclick="cargarArchivo('data/05 hydropower-consumption.csv')">
                💧 Energía Hidroeléctrica
              </button>
              <button class="btn btn-secondary text-start" onclick="cargarArchivo('data/17 installed-geothermal-capacity.csv')">
                🌋 Energía Geotérmica
              </button>
            </div>
          </div>

          <div class="card p-4">
            <h5 class="card-title-custom mb-3">Filtros de Búsqueda</h5>
            
            <div class="mb-3">
              <label class="form-label">País / Región</label>
              <select id="filtroPais" class="form-select">
                <option value="">Todos</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Año</label>
              <select id="filtroAnio" class="form-select">
                <option value="">Todos</option>
              </select>
            </div>

            <div class="mb-0">
              <label class="form-label">Buscar por texto</label>
              <input type="text" id="buscar" class="form-control" placeholder="Ej. Argentina, 2021...">
            </div>
          </div>

        </div>

        <div class="col-lg-7 col-xl-8">
          <div class="card p-4 h-100 d-flex flex-column">
            <h5 class="card-title-custom mb-3">Registros Encontrados</h5>
            
            <div class="table-responsive flex-grow-1">
              <table class="table table-hover align-middle mb-0">
                <thead id="encabezadoTabla" class="table-success text-white">
                  </thead>
                <tbody id="tablaDatos">
                  </tbody>
              </table>
            </div>
          </div>
        </div>

      </div> </div> <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="js/tabla.js"></script>
  </body>
</html>
